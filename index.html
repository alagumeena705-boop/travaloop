<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Traveloop – Master Database Access</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #08080f; --surface: #10101e; --surface2: #18182e;
  --purple: #7c3aed; --purple-light: #a855f7; --text: #f4f0ff; 
  --muted: #8b80a8; --border: rgba(124,58,237,0.2); --error: #ff4d4d;
}
* { margin:0; padding:0; box-sizing:border-box; font-family:'Outfit',sans-serif; }
body { background:var(--bg); color:var(--text); overflow-x:hidden; }

/* PAGES */
.page { display: none; padding: 20px; animation: fadeIn 0.3s ease; }
.page.active { display: block; }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

/* NAV */
nav { display: none; background: rgba(8,8,15,0.95); padding: 15px; border-bottom: 1px solid var(--border); position: sticky; top:0; z-index:100; justify-content:space-between; }
.nav-menu { display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; }
.nav-menu button { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); padding: 8px 15px; border-radius: 20px; cursor: pointer; white-space: nowrap; }
.nav-menu button.active { background: var(--purple); color: #fff; }

/* CARDS & FORMS */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 15px; padding: 20px; margin-top: 15px; }
input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; background: var(--surface2); border: 1px solid var(--border); color: #fff; border-radius: 10px; outline: none; }
.btn { background: var(--purple); color:#fff; border:none; padding:12px; border-radius:10px; font-weight:600; cursor:pointer; width: 100%; margin-top:10px; }
.btn-delete { background: var(--error); margin-top: 5px; padding: 8px; font-size: 0.8rem; }

/* TRIP STATUS COLORS */
.tag { font-size: 0.7rem; padding: 3px 8px; border-radius: 5px; font-weight: bold; text-transform: uppercase; }
.past { background: #555; color: #ccc; }
.present { background: #2ecc71; color: #fff; }
.future { background: var(--purple); color: #fff; }

.trip-item { border-bottom: 1px solid var(--border); padding: 15px 0; display: flex; justify-content: space-between; align-items: center; }
</style>
</head>
<body>

<nav id="main-nav">
  <div style="font-weight:700; color:var(--purple-light)">Traveloop</div>
  <div class="nav-menu">
    <button onclick="showPage('dashboard')" id="nav-dashboard">🏠 Home</button>
    <button onclick="showPage('trips')" id="nav-trips">🗺️ My Database</button>
    <button onclick="showPage('admin')" id="nav-admin">⚙️ Settings</button>
  </div>
</nav>

<div class="page active" id="page-login">
  <div style="max-width:350px; margin: 100px auto; text-align:center;">
    <h1 style="font-size:3rem; margin-bottom:20px;">Traveloop</h1>
    <div class="card">
      <input type="text" id="login-user" placeholder="Enter Admin Name">
      <button class="btn" onclick="doLogin()">Login to Database</button>
    </div>
  </div>
</div>

<div class="page" id="page-dashboard">
  <h2>Welcome, <span id="user-display"></span>!</h2>
  <div class="card">
    <h3>Quick Stats</h3>
    <p>Total Trips in Database: <span id="total-count">0</span></p>
    <button class="btn" onclick="showPage('trips')">Manage Database →</button>
  </div>
</div>

<div class="page" id="page-trips">
  <h2>Trip Master Database</h2>
  
  <div class="card">
    <h4 style="color:var(--purple-light)">+ Add New Trip Detail</h4>
    <input type="text" id="dest" placeholder="Destination Name (e.g. Paris)">
    <input type="date" id="t-date">
    <select id="t-status">
      <option value="past">Past Trip (Vandhu Mudichadhu)</option>
      <option value="present">Present Trip (Ippo Poitu Irukkuradhu)</option>
      <option value="future">Future Trip (Ini Mela Poga Poradhu)</option>
    </select>
    <button class="btn" onclick="addTrip()">Save to Database</button>
  </div>

  <div id="trip-list-container"></div>
</div>

<script>
// --- DATABASE INITIALIZATION ---
let tripsDB = JSON.parse(localStorage.getItem('traveloop_db')) || [
  { id: 1, dest: "Chennai", date: "2023-05-10", status: "past" },
  { id: 2, dest: "Ooty", date: "2024-05-10", status: "present" },
  { id: 3, dest: "Switzerland", date: "2025-12-20", status: "future" }
];

function saveDB() {
  localStorage.setItem('traveloop_db', JSON.stringify(tripsDB));
  renderTrips();
}

function renderTrips() {
  const container = document.getElementById('trip-list-container');
  const countDisplay = document.getElementById('total-count');
  container.innerHTML = "";
  countDisplay.innerText = tripsDB.length;

  tripsDB.forEach((trip) => {
    const div = document.createElement('div');
    div.className = "card trip-item";
    div.innerHTML = `
      <div>
        <span class="tag ${trip.status}">${trip.status}</span>
        <h3 style="margin-top:5px">${trip.dest}</h3>
        <small style="color:var(--muted)">Date: ${trip.date}</small>
      </div>
      <div style="text-align:right">
        <button class="btn btn-delete" onclick="deleteTrip(${trip.id})">Delete</button>
      </div>
    `;
    container.appendChild(div);
  });
}

// --- CRUD OPERATIONS ---
function addTrip() {
  const dest = document.getElementById('dest').value;
  const date = document.getElementById('t-date').value;
  const status = document.getElementById('t-status').value;

  if(!dest || !date) return alert("Please fill all details!");

  const newTrip = {
    id: Date.now(),
    dest: dest,
    date: date,
    status: status
  };

  tripsDB.push(newTrip);
  saveDB();
  
  // Clear inputs
  document.getElementById('dest').value = "";
}

function deleteTrip(id) {
  if(confirm("Are you sure you want to delete this trip from database?")) {
    tripsDB = tripsDB.filter(t => t.id !== id);
    saveDB();
  }
}

// --- NAVIGATION ---
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.getElementById('main-nav').style.display = (name === 'login') ? 'none' : 'flex';
  
  document.querySelectorAll('.nav-menu button').forEach(b => b.classList.remove('active'));
  const activeBtn = document.getElementById('nav-' + name);
  if(activeBtn) activeBtn.classList.add('active');
}

function doLogin() {
  const user = document.getElementById('login-user').value || "Admin";
  document.getElementById('user-display').innerText = user;
  showPage('dashboard');
  renderTrips();
}

window.onload = () => {
  if(!localStorage.getItem('traveloop_db')) saveDB();
};
</script>
</body>
</html>
