<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Traveloop Pro – Ultimate Data Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #08080f; --surface: #10101e; --surface2: #18182e;
  --purple: #7c3aed; --purple-light: #a855f7; --text: #f4f0ff; 
  --muted: #8b80a8; --border: rgba(124,58,237,0.2); --accent: #e879f9; --success: #4ade80;
}
* { margin:0; padding:0; box-sizing:border-box; font-family:'Outfit',sans-serif; }
body { background:var(--bg); color:var(--text); overflow-x:hidden; }

/* NAVIGATION */
nav { display: none; background: rgba(8,8,15,0.98); backdrop-filter: blur(15px); padding: 15px; border-bottom: 1px solid var(--border); position: sticky; top:0; z-index:1000; }
.nav-menu { display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; }
.nav-menu::-webkit-scrollbar { display: none; }
.nav-menu button { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); padding: 10px 18px; border-radius: 25px; cursor: pointer; white-space: nowrap; font-size: 0.85rem; }
.nav-menu button.active { background: var(--purple); color: #fff; }

/* PAGES */
.page { display: none; padding: 20px; animation: fadeIn 0.3s ease; max-width: 1200px; margin: 0 auto; }
.page.active { display: block; }
@keyframes fadeIn { from { opacity:0; transform: translateY(10px); } to { opacity:1; } }

/* UI ELEMENTS */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 20px; margin-top: 15px; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
.btn { background: var(--purple); color:#fff; border:none; padding:12px; border-radius:10px; font-weight:600; cursor:pointer; width: 100%; transition: 0.2s; }
input, select { width: 100%; padding: 12px; margin: 8px 0; background: var(--surface2); border: 1px solid var(--border); color: #fff; border-radius: 10px; }

/* DYNAMIC LABELS */
.tag { font-size: 0.7rem; padding: 4px 8px; border-radius: 5px; background: var(--purple); margin-bottom: 8px; display: inline-block; }
.price { color: var(--success); font-weight: 700; font-size: 1.1rem; }
</style>
</head>
<body>

<nav id="main-nav">
  <div class="nav-menu">
    <button onclick="showPage('dashboard')" id="btn-dashboard" class="active">🏠 Home</button>
    <button onclick="showPage('search')" id="btn-search">🔍 Find Trip</button>
    <button onclick="showPage('itinerary')" id="btn-itinerary">📅 26-Day Plan</button>
    <button onclick="showPage('flights')" id="btn-flights">✈️ Flight Results</button>
    <button onclick="showPage('hotels')" id="btn-hotels">🏨 Hotel Results</button>
    <button onclick="showPage('profile')" id="btn-profile">👤 Profile</button>
  </div>
</nav>

<div class="page active" id="page-login">
  <div style="max-width:400px; margin: 100px auto; text-align:center;">
    <h1 style="font-family:'Cormorant Garamond'; font-size:3.5rem;">Travel<span>oop</span></h1>
    <div class="card">
      <input type="text" id="user-input" placeholder="Admin Username">
      <button class="btn" onclick="doLogin()">Login & Sync Data</button>
    </div>
  </div>
</div>

<div class="page" id="page-search">
  <h2>Plan Your Next Journey</h2>
  <div class="card" style="max-width: 600px; margin: 20px auto;">
    <label>From (Source)</label>
    <input type="text" id="src-city" placeholder="e.g. Chennai">
    <label>To (Destination)</label>
    <input type="text" id="dest-city" placeholder="e.g. Paris">
    <label>Number of Days</label>
    <input type="number" id="trip-days" placeholder="e.g. 26">
    <button class="btn" onclick="searchTrip()">Search Flights & Hotels</button>
  </div>
</div>

<div class="page" id="page-dashboard">
  <h2>Welcome back, <span id="dash-user">Admin</span></h2>
  <div class="grid">
    <div class="card"><h3>Active Search</h3><p id="active-route" style="color:var(--success)">No active search</p></div>
    <div class="card"><h3>Today's Status</h3><p>Ready to Fly ✈️</p></div>
  </div>
</div>

<div class="page" id="page-flights">
  <h2>Available Flights (Top 10+)</h2>
  <div id="flight-list" class="grid">
    <p style="color:var(--muted)">Search for a trip to see results.</p>
  </div>
</div>

<div class="page" id="page-hotels">
  <h2>Recommended Luxury Hotels</h2>
  <div id="hotel-list" class="grid">
    <p style="color:var(--muted)">Search for a trip to see results.</p>
  </div>
</div>

<div class="page" id="page-itinerary"><h2>Itinerary</h2><div id="itin-list" class="card"></div></div>
<div class="page" id="page-profile"><h2>Profile</h2><div class="card">Name: <span id="prof-disp-name"></span></div></div>

<script>
// NAVIGATION
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.getElementById('main-nav').style.display = (name === 'login') ? 'none' : 'block';
  document.querySelectorAll('.nav-menu button').forEach(b => b.classList.remove('active'));
  if(document.getElementById('btn-' + name)) document.getElementById('btn-' + name).classList.add('active');
}

function doLogin() {
  const user = document.getElementById('user-input').value || "Admin";
  document.getElementById('dash-user').innerText = user;
  document.getElementById('prof-disp-name').innerText = user;
  showPage('search');
}

// SEARCH CORE LOGIC
function searchTrip() {
  const from = document.getElementById('src-city').value;
  const to = document.getElementById('dest-city').value;
  const days = document.getElementById('trip-days').value;

  if(!from || !to || !days) { alert("Please enter all details!"); return; }

  document.getElementById('active-route').innerText = `${from} ➔ ${to} (${days} Days)`;
  
  generateFlights(from, to);
  generateHotels(to, days);
  
  showPage('flights'); // Jump to flights after search
}

function generateFlights(src, dest) {
  const airlines = ["Emirates", "Qatar Airways", "Etihad", "Air France", "IndiGo", "Lufthansa", "British Airways", "Air India", "Singapore Air", "Turkish Airlines", "Swiss Air"];
  const list = document.getElementById('flight-list');
  list.innerHTML = "";

  airlines.forEach(air => {
    const price = Math.floor(Math.random() * (90000 - 35000) + 35000);
    list.innerHTML += `
      <div class="card">
        <span class="tag">DEPARTURE: ${src}</span>
        <h4>${air}</h4>
        <p style="font-size:0.85rem;">Non-stop / 1-Stop to ${dest}</p>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;">
          <span class="price">₹${price.toLocaleString()}</span>
          <button class="btn" style="width:100px; padding:5px;" onclick="alert('Booking Redirect...')">Book</button>
        </div>
      </div>`;
  });
}

function generateHotels(dest, days) {
  const hotels = ["Grand Hyatt", "The Ritz-Carlton", "Four Seasons", "Marriott Luxe", "Hilton Riverside", "InterContinental", "The Dolder Grand", "Shangri-La", "Sheraton Grand", "Bürgenstock Alpine Spa", "Mandarin Oriental", "Le Grand Mazarin"];
  const list = document.getElementById('hotel-list');
  list.innerHTML = "";

  hotels.forEach(h => {
    const perNight = Math.floor(Math.random() * (45000 - 15000) + 15000);
    const total = perNight * days;
    list.innerHTML += `
      <div class="card">
        <span class="tag">LOCATION: ${dest}</span>
        <h4>${h}</h4>
        <p style="font-size:0.8rem; color:var(--muted)">5-Star Rating • Premium Wi-Fi • Breakfast Inc.</p>
        <hr style="border:0.1px solid var(--border); margin:10px 0;">
        <p style="font-size:0.8rem;">₹${perNight.toLocaleString()} / Night</p>
        <p class="price">Total: ₹${total.toLocaleString()}</p>
        <button class="btn" style="margin-top:10px;" onclick="alert('Reserved!')">Reserve Now</button>
      </div>`;
  });
}
</script>

</body>
</html>
